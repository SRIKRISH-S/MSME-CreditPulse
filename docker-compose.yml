version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./creditpulse.db
      - MODEL_PATH=data/model.joblib
      - FRONTEND_ORIGIN=http://localhost
      - SECRET_KEY=creditpulse-docker-secret
    volumes:
      - backend-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
